name: Build Firmware

on:
  push:
    branches: [main]
    paths:
      - 'firmware/**'
      - '.github/workflows/build-firmware.yml'
  pull_request:
    paths:
      - 'firmware/**'
      - '.github/workflows/build-firmware.yml'
  workflow_dispatch:

concurrency:
  group: firmware-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - board: pico
            label: RP2040
          - board: pico2
            label: RP2350

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ARM toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential cmake

      - name: Build (${{ matrix.label }})
        run: |
          mkdir -p build && cd build
          cmake -DPICO_BOARD=${{ matrix.board }} ../firmware
          make -j$(nproc)

      - name: Upload UF2
        uses: actions/upload-artifact@v4
        with:
          name: DSPi-${{ matrix.label }}
          path: build/DSPi/DSPi.uf2
