name: Build Firmware

on:
  push:
    branches: [main]
    paths:
      - 'firmware/**'
      - '.github/workflows/build-firmware.yml'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub release'
        type: boolean
        default: true
  pull_request:
    paths:
      - 'firmware/**'
      - '.github/workflows/build-firmware.yml'

concurrency:
  group: firmware-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - board: pico
            label: RP2040
          - board: pico2
            label: RP2350

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ARM toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential cmake

      - name: Build (${{ matrix.label }})
        run: |
          mkdir -p build && cd build
          cmake -DPICO_BOARD=${{ matrix.board }} ../firmware
          make -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DSPi-${{ matrix.label }}
          path: build/DSPi/DSPi.uf2

  release:
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download RP2040 artifact
        uses: actions/download-artifact@v4
        with:
          name: DSPi-RP2040
          path: artifacts/RP2040

      - name: Download RP2350 artifact
        uses: actions/download-artifact@v4
        with:
          name: DSPi-RP2350
          path: artifacts/RP2350

      - name: Rename for release
        run: |
          cp artifacts/RP2040/DSPi.uf2 DSPi-RP2040.uf2
          cp artifacts/RP2350/DSPi.uf2 DSPi-RP2350.uf2

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}-build-${{ github.run_number }}
          generate_release_notes: true
          files: |
            DSPi-RP2040.uf2
            DSPi-RP2350.uf2
